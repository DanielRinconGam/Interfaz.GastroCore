name: Deploy Front

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configurar SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Probar conexión SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" "echo SSH_OK"

      - name: Desplegar Front
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" '
            set -e
            cd /var/www/gastrocore-front-src
            git fetch origin
            git reset --hard origin/main
            npm install
            npx expo export --platform web

            test -d dist
            mkdir -p /var/www/gastrocore-front
            rm -rf /var/www/gastrocore-front/*
            cp -r dist/* /var/www/gastrocore-front/

            sudo systemctl reload nginx
          '
